services:

  postgres:
    image: postgres:16
    container_name: apim-postgres
    environment:
      POSTGRES_DB: apim
      POSTGRES_USER: apim
      POSTGRES_PASSWORD: apim
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: apim-app
    depends_on:
      postgres:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/apim
      SPRING_DATASOURCE_USERNAME: apim
      SPRING_DATASOURCE_PASSWORD: apim
    ports:
      - "8080:8080"